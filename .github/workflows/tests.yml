name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
          python -m pip install -e . --no-deps

      - name: Run tests
        run: python -m pytest

      - name: Verify HPP ambiguity certificate
        run: python scripts/verify_ambiguity_certificate.py

      - name: Validate exact claims
        run: python scripts/validate.py data

      - name: Validate repository hygiene
        run: python scripts/validate_repository.py

      - name: Verify integrity manifest
        run: python scripts/validate.py integrity
